server.port=${PORT:8080}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# JSON logging configuration
logging.pattern.console={"timestamp":"%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z'}","level":"%level","service":"payment","logger":"%logger","msg":"%msg","request_id":"%X{request_id}","transaction_id":"%X{transaction_id}"}%n
