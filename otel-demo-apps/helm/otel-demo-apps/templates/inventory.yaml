{{- if .Values.inventory.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-inventory
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "inventory") | nindent 4 }}
spec:
  replicas: {{ .Values.inventory.replicaCount }}
  selector:
    matchLabels:
      {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "inventory") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "inventory") | nindent 8 }}
      annotations:
        {{- include "otel-demo-apps.instrumentationAnnotation" .Values.inventory.instrumentation | nindent 8 }}
        {{- with .Values.inventory.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: inventory
          image: {{ include "otel-demo-apps.image" (dict "root" . "name" .Values.inventory.image.name) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "otel-demo-apps-inventory"
            # OTEL_RESOURCE_ATTRIBUTES is set by the OTel Operator Instrumentation CR
            # service.version comes from app.kubernetes.io/version label
            - name: PORT
              value: "8080"
            - name: ORDER_URL
              value: "http://{{ include "otel-demo-apps.fullname" . }}-order:{{ .Values.order.service.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.inventory.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-inventory
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "inventory") | nindent 4 }}
spec:
  type: {{ .Values.inventory.service.type }}
  ports:
    - port: {{ .Values.inventory.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "inventory") | nindent 4 }}
{{- end }}
