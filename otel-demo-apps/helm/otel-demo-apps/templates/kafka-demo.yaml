{{- if .Values.kafkaDemo.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-kafka-demo
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "kafka-demo") | nindent 4 }}
spec:
  replicas: {{ .Values.kafkaDemo.replicaCount }}
  selector:
    matchLabels:
      {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "kafka-demo") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "kafka-demo") | nindent 8 }}
      annotations:
        {{- include "otel-demo-apps.instrumentationAnnotation" .Values.kafkaDemo.instrumentation | nindent 8 }}
        {{- with .Values.kafkaDemo.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: kafka-demo
          image: {{ include "otel-demo-apps.image" (dict "root" . "name" .Values.kafkaDemo.image.name) }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "otel-demo-apps-kafka-demo"
            # OTEL_RESOURCE_ATTRIBUTES is set by the OTel Operator Instrumentation CR
            # service.version comes from app.kubernetes.io/version label
            - name: PORT
              value: "8080"
            - name: KAFKA_BROKERS
              value: {{ .Values.kafkaDemo.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafkaDemo.kafka.topic | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.kafkaDemo.kafka.groupId | quote }}
            - name: KAFKA_CLIENT_ID
              value: "kafka-demo"
            - name: PRODUCE_INTERVAL_MS
              value: {{ .Values.kafkaDemo.kafka.produceIntervalMs | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.kafkaDemo.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-kafka-demo
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "kafka-demo") | nindent 4 }}
spec:
  type: {{ .Values.kafkaDemo.service.type }}
  ports:
    - port: {{ .Values.kafkaDemo.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "kafka-demo") | nindent 4 }}
{{- end }}
