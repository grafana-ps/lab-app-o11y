{{- if .Values.payment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-payment
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "payment") | nindent 4 }}
spec:
  replicas: {{ .Values.payment.replicaCount }}
  selector:
    matchLabels:
      {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "payment") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "payment") | nindent 8 }}
      annotations:
        {{- include "otel-demo-apps.instrumentationAnnotation" .Values.payment.instrumentation | nindent 8 }}
        {{- with .Values.payment.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: payment
          image: {{ include "otel-demo-apps.image" (dict "root" . "name" .Values.payment.image.name) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: OTEL_SERVICE_NAME
              value: "otel-demo-apps-payment"
            # OTEL_RESOURCE_ATTRIBUTES is set by the OTel Operator Instrumentation CR
            # service.version comes from app.kubernetes.io/version label
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            {{- toYaml .Values.payment.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "otel-demo-apps.fullname" . }}-payment
  namespace: {{ include "otel-demo-apps.namespace" . }}
  labels:
    {{- include "otel-demo-apps.componentLabels" (dict "root" . "component" "payment") | nindent 4 }}
spec:
  type: {{ .Values.payment.service.type }}
  ports:
    - port: {{ .Values.payment.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "otel-demo-apps.componentSelectorLabels" (dict "root" . "component" "payment") | nindent 4 }}
{{- end }}
