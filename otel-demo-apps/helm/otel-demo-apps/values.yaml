# Global settings
global:
  image:
    registry: docker.io
    repository: your-dockerhub-username
    tag: latest
    pullPolicy: IfNotPresent
  labels:
    environment: dev

# Namespace to deploy into (uses Release namespace by default)
namespace: ""

# Frontend - Node.js Express
frontend:
  enabled: true
  replicaCount: 1
  image:
    name: otel-demo-frontend
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}
  # OTel Operator annotation - set to true to enable auto-instrumentation
  instrumentation:
    enabled: false
    language: nodejs

# Catalog - Python Flask
catalog:
  enabled: true
  replicaCount: 1
  image:
    name: otel-demo-catalog
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}
  instrumentation:
    enabled: false
    language: python

# Inventory - Go
inventory:
  enabled: true
  replicaCount: 1
  image:
    name: otel-demo-inventory
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}
  instrumentation:
    enabled: false
    language: go

# Order - .NET
order:
  enabled: true
  replicaCount: 1
  image:
    name: otel-demo-order
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 300m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}
  instrumentation:
    enabled: false
    language: dotnet

# Payment - Java Spring Boot
payment:
  enabled: true
  replicaCount: 1
  image:
    name: otel-demo-payment
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 768Mi
    requests:
      cpu: 200m
      memory: 512Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}
  instrumentation:
    enabled: false
    language: java

# Kafka Demo - Node.js kafkajs (for OTel instrumentation testing)
kafkaDemo:
  enabled: false  # Requires Kafka - see k8s/kafka/README.md for setup
  replicaCount: 1
  image:
    name: otel-demo-kafka-demo
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Additional pod annotations
  #podAnnotations: {}
  # OTel Operator annotation - set to true to enable auto-instrumentation
  instrumentation:
    enabled: false
    language: nodejs
  # Kafka connection settings
  kafka:
    brokers: "kafka:9092"
    topic: "demo-topic"
    groupId: "demo-group"
    produceIntervalMs: "5000"

# Load generator - k6
loadgen:
  enabled: true
  image:
    name: otel-demo-loadgen
  # Run as a Job or Deployment
  mode: deployment  # deployment | job
  config:
    vus: 3
    duration: "30m"
    slowPercentage: 10
    errorPercentage: 5
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Additional pod annotations (e.g., beyla/auto-instrumentation: "true")
  #podAnnotations: {
  #  "beyla/auto-instrumentation": "true"
  #}

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt
  host: otel-demo.local
  tls: []
    # - secretName: otel-demo-tls
    #   hosts:
    #     - otel-demo.local

