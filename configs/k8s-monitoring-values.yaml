# The cluster name propagates to all telemetry (metrics, logs, traces, profiles)
# and is essential for filtering/grouping in multi-cluster environments
cluster:
  name: app-o11y-lab
# maxCacheSize: Maximum cache entries for Alloy components. Higher values help
# with high-cardinality environments but consume more memory
global:
  maxCacheSize: 1000000
# Defines where telemetry data is sent. Using OTLP as primary protocol simplifies
# the pipeline - one protocol for metrics/logs/traces instead of separate endpoints
# for better OTel naming convention alignment
destinations:
  - name: grafana-cloud-metrics
    type: prometheus
    url: https://prometheus-prod-32-prod-ca-east-0.grafana.net./api/prom/push
    auth:
      type: basic
      username: "1571407"
      password: REPLACE_WITH_ACCESS_POLICY_TOKEN
    # Examples of static labels we add to all metrics from this cluster
    extraLabels:
      environment: dev
      region: us-east-1
      billingid: 12345
  - name: grafana-cloud-otlp-endpoint
    type: otlp
    url: https://otlp-gateway-prod-ca-east-0.grafana.net./otlp
    protocol: http
    auth:
      type: basic
      username: "927888"
      password: REPLACE_WITH_ACCESS_POLICY_TOKEN
    processors:
      # Enriches telemetry with K8s metadata by matching pod labels
      # Examples of attributes we want on OTLP telemetry pulled from labels on pods
      k8sattributes:
        labels:
          - from: "pod"
            key: "app"
            tag_name: "app"
          - from: "pod"
            key: "team"
            tag_name: "team"
      # Examples of static attributes we set per cluster on OTLP telemetry
      # These are added to ALL telemetry from this cluster
      attributes:
        actions:
          - key: environment
            action: upsert
            value: dev
          - key: region
            action: upsert
            value: us-east-1
          - key: billingid
            action: upsert
            value: 12345
      # Sets OpenTelemetry semantic conventions from K8s labels
      # when not already present. The "where ... == nil" conditions ensure we don't
      # overwrite explicitly set values from instrumented apps
      # This provides sensible defaults for apps without full instrumentation
      transform:
        metrics:
          resource:
            - set(attributes["deployment.environment"], "dev") where attributes["deployment.environment"] == nil
            - set(attributes["service.name"], attributes["k8s.pod.labels.app_kubernetes_io/name"]) where attributes["service.name"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/name"] != nil
            - set(attributes["service.version"], attributes["k8s.pod.labels.app_kubernetes_io/version"]) where attributes["service.version"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/version"] != nil
            - set(attributes["service.instance.id"], attributes["k8s.pod.name"]) where attributes["service.instance.id"] == nil and attributes["k8s.pod.name"] != nil
        logs:
          resource:
            - set(attributes["deployment.environment"], "dev") where attributes["deployment.environment"] == nil
            - set(attributes["service.name"], attributes["k8s.pod.labels.app_kubernetes_io/name"]) where attributes["service.name"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/name"] != nil
            - set(attributes["service.version"], attributes["k8s.pod.labels.app_kubernetes_io/version"]) where attributes["service.version"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/version"] != nil
            - set(attributes["service.instance.id"], attributes["k8s.pod.name"]) where attributes["service.instance.id"] == nil and attributes["k8s.pod.name"] != nil
        traces:
          resource:
            - set(attributes["deployment.environment"], "dev") where attributes["deployment.environment"] == nil
            - set(attributes["service.name"], attributes["k8s.pod.labels.app_kubernetes_io/name"]) where attributes["service.name"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/name"] != nil
            - set(attributes["service.version"], attributes["k8s.pod.labels.app_kubernetes_io/version"]) where attributes["service.version"] == nil and attributes["k8s.pod.labels.app_kubernetes_io/version"] != nil
            - set(attributes["service.instance.id"], attributes["k8s.pod.name"]) where attributes["service.instance.id"] == nil and attributes["k8s.pod.name"] != nil  # Pyroscope endpoint for continuous profiling data
  # extraLabels add static metadata for cost allocation and filtering
  - name: grafana-cloud-profiles
    type: pyroscope
    url: https://profiles-prod-006.grafana.net
    auth:
      type: basic
      username: "927888"
      password: REPLACE_WITH_ACCESS_POLICY_TOKEN
    extraLabels:
      environment: dev
      region: us-east-1
      billingid: 12345
  # Local in-cluster receiver for profiles - acts as buffering/processing layer
  # before forwarding to cloud, providing resilience and local aggregation
  - name: profiles-receiver
    type: pyroscope
    url: http://grafana-alloy-receiver.grafana-k8s-monitoring.svc.cluster.local:4040
# Collects Kubernetes infrastructure metrics via cAdvisor and kube-state-metrics
# These provide visibility into node/pod resource usage and Kubernetes object states
clusterMetrics:
  enabled: true
  # Node labels enrich metrics with cloud provider metadata for cost analysis
  # and capacity planning (which instance types run which workloads)
  nodeLabels:
    availabilityZone: true
    instanceType: true
    nodeArchitecture: true
    nodeOS: true
    nodePool: true
    nodeRole: true
    region: true
  # cAdvisor provides container-level resource metrics (CPU, memory, network, disk)
  # Excluding system namespaces reduces noise and cost - detailed container metrics
  # for kube-system pods are typically not needed
  cadvisor:
    metricsTuning:
      excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
  # kube-state-metrics provides Kubernetes object state metrics (deployments,
  # pods, nodes, etc.) - essential for understanding cluster health
  kube-state-metrics:
    namespacesDenylist: ["kube-system","kube-public","kube-node-lease"]
    discoveryType: service
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    metricsTuning:
      includeMetrics:
        - kube_pod_labels
    # metricLabelsAllowlist promotes K8s labels to metric labels for filtering
    # This is critical for joining metrics to business context
    # The extensive node label list covers multiple cloud providers (EKS, GKE, AKS, Karpenter)
    metricLabelsAllowlist:
      - nodes=[agentpool,alpha.eksctl.io/cluster-name,alpha.eksctl.io/nodegroup-name,beta.kubernetes.io/instance-type,cloud.google.com/gke-nodepool,cluster-name,ec2.amazonaws.com/Name,ec2.amazonaws.com/aws-autoscaling-groupName,ec2.amazonaws.com/aws-autoscaling-group-name,ec2.amazonaws.com/name,eks.amazonaws.com/nodegroup,k8s.io/cloud-provider-aws,karpenter.sh/nodepool,kubernetes.azure.com/cluster,kubernetes.io/arch,kubernetes.io/hostname,kubernetes.io/os,node.kubernetes.io/instance-type,node.kubernetes.io/role,topology.kubernetes.io/region,topology.kubernetes.io/zone]
      # Examples of labels on pods we want added to container metrics
      # Enables team-level dashboards and cost attribution
      - pods=[app,team]
# Collects Kubernetes events (pod scheduling, restarts, failures, scaling)
clusterEvents:
  enabled: true
# Collects system-level logs from nodes (kubelet, containerd, kernel messages)
nodeLogs:
  enabled: true
# Collects application logs from pod stdout/stderr
# Excluding system namespaces reduces volume/cost - kube-system logs are often
# noisy and less actionable for app teams
podLogs:
  enabled: true
  excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
  # Examples of labels on pods we want added to logs
  # Maps pod labels to log labels so we can query by app/team and cost attribute
  labels:
    app: "app"
    team: "team"
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true  # Installs Prometheus Operator CRDs if they don't exist
annotationAutodiscovery:
  enabled: true
  excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
# Opens OTLP receivers for instrumented applications to send traces/metrics/logs
# This is where OpenTelemetry SDKs send data. The processors enrich and transform
# telemetry before forwarding to destinations
applicationObservability:
  enabled: true
  receivers:
    otlp:
      http:
        enabled: true
        port: 4318
      grpc:
        enabled: true
        port: 4317
  # Filters drop noisy, low-value telemetry to reduce cost and improve signal-to-noise
  metrics:
    filters:
      metric:
        - IsMatch(resource.attributes["k8s.namespace.name"], "^(kube-system|kube-public|kube-node-lease)$")
  logs:
    filters:
      log_record:
        - IsMatch(resource.attributes["k8s.namespace.name"], "^(kube-system|kube-public|kube-node-lease)$")
  traces:
    filters:
      span:
        - IsMatch(resource.attributes["k8s.namespace.name"], "^(kube-system|kube-public|kube-node-lease)$")
        # Health check and monitoring endpoints - high volume, no business value
        - IsMatch(attributes["http.route"], ".*/health.*")
        - IsMatch(attributes["http.route"], ".*/live.*")
        - IsMatch(attributes["http.route"], ".*/readiness.*")
        - IsMatch(attributes["http.route"], ".*/startup.*")
        - IsMatch(attributes["http.route"], ".*/heartbeat.*")
        - IsMatch(attributes["http.route"], ".*/ready.*")
        - IsMatch(attributes["http.route"], ".*/ping.*")
        - IsMatch(attributes["http.route"], ".*/actuator.*")
        - IsMatch(attributes["http.route"], ".*/metrics.*")
        # Database ping operations - connection keep-alives, not useful for debugging
        - attributes["db.operation"] == "PING"
        # HTTP method filtering - preflight requests have no useful trace data
        - 'attributes["http.method"] == "OPTIONS"'
        - 'attributes["http.method"] == "HEAD"'
autoInstrumentation:
  enabled: true
  beyla:
    config:
      data:
        discovery:
          # Exclude system namespaces from auto-instrumentation
          # Focus on application namespaces only
          exclude_services:
            - k8s_namespace: kube-system
            - k8s_namespace: kube-public
            - k8s_namespace: kube-node-lease
            - k8s_namespace: grafana-k8s-monitoring
        # Routes configuration for outbound traffic capture
        # Reference: https://grafana.com/docs/beyla/latest/configure/routes-decorator/
        routes:
          unmatched: heuristic  # Capture outbound routes not explicitly defined
          # Mirrors the OTLP trace filters for consistency in what's dropped
          ignored_patterns:
            - /health*
            - /live*
            - /readiness*
            - /startup*
            - /heartbeat*
            - /ready*
            - /ping*
            - /actuator*
            - /metrics*
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        memory: 4Gi
# Profiles flow: app → profiles-receiver (local Alloy) → grafana-cloud-profiles
# This two-hop architecture provides buffering and local aggregation
profiling:
  enabled: true
  destinations:
    - profiles-receiver
  ebpf:
    excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
  java:
    excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
  pprof:
    excludeNamespaces: ["kube-system","kube-public","kube-node-lease"]
# Local receiver endpoint for profiles - receives from profiling agents above,
# then forwards to Grafana Cloud. Provides buffering and reduces direct cloud API calls
profilesReceiver:
  enabled: true
  destinations:
    - grafana-cloud-profiles
alloy-operator:
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 150Mi
alloy-metrics:
  enabled: true
alloy-logs:
  enabled: true
alloy-profiles:
  enabled: true
alloy-singleton:
  enabled: true
alloy-receiver:
  enabled: true
  alloy:
    # Add this when debugging to route all traffic through a single alloy-receiver pod
    #controller:
    #  type: deployment
    #  replicas: 1
    extraPorts:
      - name: http-otlp
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: grpc-otlp
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: profiles
        port: 4040
        targetPort: 4040
        protocol: TCP
collectorCommon:
  alloy:
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        memory: 4Gi
# Built-in integrations for monitoring common infrastructure components
# The alloy integration enables self-monitoring of the Alloy collectors
# Provides telemetry data for Alloy Health integration dashboards and alerts
# If fleet management is enabled by adding remoteConfig to alloy deployments, 
# this won't be required as the out-of-box pipelines already cover alloy self
# monitoring.
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name: [alloy-metrics, alloy-singleton, alloy-logs, alloy-receiver, alloy-profiles]